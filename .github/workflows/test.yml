name: Test SAFLII Scraper

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Write scraper
        run: |
          cat > scraper.py << 'EOF'
          import time
          import requests
          from bs4 import BeautifulSoup

          TARGET_URL = "https://www.saflii.org/za/cases/ZAGPJHC/2013/3.html"

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
          }

          FALLBACK_TIMESTAMPS = [
              "20250401120000",
              "20250101120000",
              "20241001120000",
              "20240101120000",
              "20230601120000",
              "20230101120000",
              "20220101120000",
              "20210101120000",
              "20200101120000",
              "20190101120000",
          ]


          def find_snapshot_cdx(url, retries=3, delay=5):
              cdx = "http://web.archive.org/cdx/search/cdx"
              params = {
                  "url": url,
                  "output": "json",
                  "limit": 5,
                  "filter": "statuscode:200",
                  "fl": "timestamp,statuscode,mimetype",
                  "collapse": "timestamp:8",
              }
              for attempt in range(1, retries + 1):
                  try:
                      print(f"CDX attempt {attempt}/{retries}...")
                      r = requests.get(cdx, params=params, headers=HEADERS, timeout=20)
                      r.raise_for_status()
                      results = r.json()
                      if len(results) <= 1:
                          print("CDX returned no snapshots.")
                          return []
                      snapshots = results[1:]
                      print(f"Found {len(snapshots)} snapshot(s):")
                      for s in snapshots:
                          print(f"  timestamp={s[0]}  status={s[1]}  mime={s[2]}")
                      return [s[0] for s in snapshots]
                  except requests.exceptions.HTTPError as e:
                      print(f"CDX error: {e}")
                      if attempt < retries:
                          print(f"Retrying in {delay}s...")
                          time.sleep(delay)
                  except Exception as e:
                      print(f"CDX unexpected error: {e}")
                      break
              return []


          def probe_fallback_timestamps(url):
              print("\nCDX unavailable — probing fallback timestamps directly...")
              found = []
              for ts in FALLBACK_TIMESTAMPS:
                  probe_url = f"https://web.archive.org/web/{ts}/{url}"
                  try:
                      r = requests.head(probe_url, headers=HEADERS, timeout=10, allow_redirects=True)
                      print(f"  {ts} -> {r.status_code} | {r.url[:70]}")
                      if r.status_code == 200:
                          found.append(ts)
                          if len(found) >= 2:
                              break
                  except Exception as e:
                      print(f"  {ts} -> Error: {e}")
                  time.sleep(0.5)
              return found


          def fetch_snapshot(timestamp, url):
              wayback_url = f"https://web.archive.org/web/{timestamp}id_/{url}"
              print(f"\nFetching: {wayback_url}")
              r = requests.get(wayback_url, headers=HEADERS, timeout=30)
              r.raise_for_status()
              return r.text


          def parse_judgment(html):
              soup = BeautifulSoup(html, "html.parser")
              for tag in soup(["script", "style", "nav", "header", "footer"]):
                  tag.decompose()
              title = soup.title.string.strip() if soup.title else "Unknown"
              text = soup.get_text(separator="\n", strip=True)
              lines = [l for l in text.splitlines() if l.strip()]
              return title, "\n".join(lines)


          if __name__ == "__main__":
              print(f"Target: {TARGET_URL}\n")
              timestamps = find_snapshot_cdx(TARGET_URL)
              if not timestamps:
                  timestamps = probe_fallback_timestamps(TARGET_URL)
              if not timestamps:
                  print("\nNo snapshots found via any method.")
                  exit(1)
              print(f"\nUsing timestamp: {timestamps[0]}")
              html = fetch_snapshot(timestamps[0], TARGET_URL)
              title, text = parse_judgment(html)
              print(f"\nTitle: {title}")
              print(f"\n--- Judgment (first 3000 chars) ---\n")
              print(text[:3000])
              with open("judgment.txt", "w", encoding="utf-8") as f:
                  f.write(text)
              print("\n\nFull text saved to judgment.txt")
          EOF

      - name: Run scraper
        run: python scraper.py

      - name: Check output
        run: |
          if [ ! -f judgment.txt ]; then
            echo "judgment.txt not found"
            exit 1
          fi
          echo "judgment.txt created — $(wc -c < judgment.txt) bytes"

      - name: Upload judgment artifact
        uses: actions/upload-artifact@v4
        with:
          name: judgment
          path: judgment.txt