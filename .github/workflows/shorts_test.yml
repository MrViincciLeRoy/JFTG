name: Shorts Image Test

on:
  workflow_dispatch:
  push:
    paths:
      - 'shorts/**'
      - 'cases/**'

permissions:
  contents: write

jobs:
  generate-images:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai requests

      - name: Run Stage 1+2+4 (story + images, no TTS)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python shorts/main.py \
            --cases-dir cases/ \
            --stories-dir output/stories/ \
            --stages 1,2,4 \
            --limit 3

      - name: Show output summary
        run: |
          echo "--- Stories ---"
          ls output/stories/ 2>/dev/null || echo "none"
          echo ""
          echo "--- Images ---"
          find output/images/ -name "*.png" 2>/dev/null | head -20 || echo "none"

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/stories/ output/images/
          git diff --cached --quiet || git commit -m "images generated $(date +'%Y-%m-%d')"
          git push