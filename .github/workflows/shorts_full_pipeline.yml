name: Shorts Full Pipeline

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-shorts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y espeak-ng ffmpeg libsndfile1

      - name: Install Python deps
        run: pip install openai requests huggingface_hub pillow "kokoro>=0.9.4" soundfile numpy

      - name: Run full pipeline (stages 1,2,3,4,45,5)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TOKEN_2: ${{ secrets.HF_TOKEN_2 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python shorts/main.py \
            --cases-dir cases/ \
            --stories-dir output/stories/ \
            --stages 1,2,3,4,45,5 \
            --limit 3

      - name: Show output summary
        run: |
          echo "--- Stories ---"
          ls output/stories/ 2>/dev/null || echo "none"
          echo "--- Audio ---"
          ls output/audio/ 2>/dev/null || echo "none"
          echo "--- AI Images ---"
          find output/images/ -name "*.png" 2>/dev/null | wc -l
          echo "--- Stock Photos ---"
          find output/images/ -name "stock_photo_*.jpg" 2>/dev/null | wc -l
          echo "--- Stock Videos ---"
          find output/images/ -name "stock_video_*.mp4" 2>/dev/null | wc -l
          echo "--- Final Videos ---"
          ls output/videos/ 2>/dev/null || echo "none"

      - name: Upload Pipeline Results as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shorts-output-${{ github.run_id }}
          path: output/
          retention-days: 7
