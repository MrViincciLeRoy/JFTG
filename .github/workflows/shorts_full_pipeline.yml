name: Shorts Full Pipeline

on:
  workflow_dispatch:
  

permissions:
  contents: write

jobs:
  generate-shorts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y espeak-ng ffmpeg libsndfile1

      - name: Install Python deps
        run: pip install openai requests huggingface_hub pillow kokoro>=0.9.4 soundfile numpy

      - name: Run full pipeline (stages 1,2,3,4,5)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TOKEN_2: ${{ secrets.HF_TOKEN_2 }}
        run: |
          python shorts/main.py \
            --cases-dir cases/ \
            --stories-dir output/stories/ \
            --stages 1,2,3,4,5 \
            --limit 3

      - name: Show output summary
        run: |
          echo "--- Stories ---"
          ls output/stories/ 2>/dev/null || echo "none"
          echo "--- Audio ---"
          ls output/audio/ 2>/dev/null || echo "none"
          echo "--- Images ---"
          find output/images/ -name "*.png" 2>/dev/null | wc -l
          echo "--- Videos ---"
          ls output/videos/ 2>/dev/null || echo "none"

      - name: Commit all outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f output/
          git diff --cached --quiet || git commit -m "pipeline output $(date +'%Y-%m-%d')"
          git push