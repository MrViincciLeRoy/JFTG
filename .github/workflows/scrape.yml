name: SAFLII Crime Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps for WeasyPrint
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b

      - name: Install Python deps
        run: pip install pdfplumber requests weasyprint

      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scraper.py

      - name: Commit new cases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cases/
          git diff --cached --quiet || git commit -m "scraped cases $(date +'%Y-%m-%d')"
          git push