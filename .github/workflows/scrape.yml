name: SAFLII Crime Scraper

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tor
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tor

      - name: Start Tor
        run: |
          sudo service tor restart
          sleep 15

      - name: Verify Tor
        run: |
          python3 -c "
          import requests, warnings
          warnings.filterwarnings('ignore')
          try:
              r = requests.get(
                  'https://check.torproject.org/api/ip',
                  proxies={'http':'socks5://127.0.0.1:9050','https':'socks5://127.0.0.1:9050'},
                  timeout=15, verify=False
              )
              d = r.json()
              print('Tor active:', d.get('IsTor'), '| Exit IP:', d.get('IP'))
          except Exception as e:
              print('Tor check failed (non-fatal):', e)
          "

      - name: Install Python deps
        run: pip install playwright pdfplumber "requests[socks]" PySocks beautifulsoup4

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Upload cases
        uses: actions/upload-artifact@v4
        with:
          name: saflii-cases-${{ github.run_number }}
          path: cases/
          retention-days: 90