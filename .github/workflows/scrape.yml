name: SAFLII Crime Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4 pdfplumber

      - name: Write scraper
        run: |
          cat > scraper.py << 'EOF'
          import re, json, logging, warnings, os
          from pathlib import Path
          from datetime import datetime
          from time import sleep
          from random import uniform

          import pdfplumber
          import requests
          from bs4 import BeautifulSoup

          warnings.filterwarnings("ignore")
          logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
          log = logging.getLogger(__name__)

          OUTPUT_DIR = Path("cases")
          OUTPUT_DIR.mkdir(exist_ok=True)

          SERPAPI_KEY = os.environ.get("SERPAPI_KEY", "")
          SERPAPI_URL = "https://serpapi.com/search"

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Referer": "https://www.saflii.org/",
              "Accept": "text/html,application/xhtml+xml,*/*",
          }

          WAYBACK_FALLBACK_TS = [
              "20260101120000",
              "20250601120000",
              "20250101120000",
              "20240601120000",
              "20240101120000",
              "20230101120000",
          ]

          QUERIES = [
              'site:saflii.org "Gauteng" "murder" "accused" "convicted" filetype:pdf',
              'site:saflii.org "Western Cape" "murder" "life imprisonment" filetype:pdf',
              'site:saflii.org "KwaZulu-Natal" "murder" "convicted" filetype:pdf',
              'site:saflii.org "premeditated murder" "Gauteng" filetype:pdf',
              'site:saflii.org "serial killer" "South Africa" "convicted" filetype:pdf',
              'site:saflii.org "Gauteng" "kidnapping" "murder" filetype:pdf',
              'site:saflii.org "Western Cape" "robbery" "murder" filetype:pdf',
              'site:saflii.org "femicide" "South Africa" "convicted" filetype:pdf',
              'site:saflii.org "rape" "murder" "Gauteng" "life imprisonment" filetype:pdf',
          ]


          def serpapi_search(query, max_results=20):
              params = {
                  "engine": "google", "q": query, "num": max_results,
                  "gl": "za", "hl": "en", "api_key": SERPAPI_KEY,
              }
              try:
                  r = requests.get(SERPAPI_URL, params=params, timeout=20)
                  r.raise_for_status()
                  results = r.json().get("organic_results", [])
                  log.info(f"SerpAPI: {len(results)} results for {query!r}")
                  urls = []
                  for item in results:
                      url = item.get("link", "")
                      if "saflii.org" not in url:
                          continue
                      if url.endswith(".pdf"):
                          url = url[:-4] + ".html"
                      if url.endswith(".html"):
                          urls.append(url)
                  return urls
              except Exception as e:
                  log.error(f"SerpAPI error: {e}")
                  return []


          def wayback_snapshot(url):
              cdx = "http://web.archive.org/cdx/search/cdx"
              params = {
                  "url": url, "output": "json", "limit": 3,
                  "filter": "statuscode:200", "fl": "timestamp", "collapse": "timestamp:8",
              }
              try:
                  r = requests.get(cdx, params=params, headers=HEADERS, timeout=15)
                  r.raise_for_status()
                  data = r.json()
                  if len(data) > 1:
                      return data[1][0]
              except Exception as e:
                  log.warning(f"CDX failed ({e}), probing fallback timestamps...")

              for ts in WAYBACK_FALLBACK_TS:
                  try:
                      probe = f"https://web.archive.org/web/{ts}/{url}"
                      r = requests.head(probe, headers=HEADERS, timeout=10, allow_redirects=True)
                      if r.status_code == 200:
                          log.info(f"  Fallback ts {ts} works for {url}")
                          return ts
                  except Exception:
                      pass
                  sleep(0.3)
              return None


          def fetch_via_wayback(url):
              ts = wayback_snapshot(url)
              if not ts:
                  log.warning(f"No Wayback snapshot for {url}")
                  return None
              wayback_url = f"https://web.archive.org/web/{ts}id_/{url}"
              try:
                  r = requests.get(wayback_url, headers=HEADERS, timeout=30)
                  r.raise_for_status()
                  log.info(f"Fetched via Wayback ({ts}): {url}")
                  return r.text
              except Exception as e:
                  log.warning(f"Wayback fetch failed: {e}")
                  return None


          def fetch_html(url):
              try:
                  r = requests.get(url, headers=HEADERS, timeout=20)
                  if r.status_code == 200:
                      log.info(f"Fetched direct: {url}")
                      return r.text
                  log.warning(f"Direct fetch HTTP {r.status_code}: {url}")
              except Exception as e:
                  log.warning(f"Direct fetch error: {e}")
              log.info(f"Falling back to Wayback for {url}")
              return fetch_via_wayback(url)


          def parse_text_from_html(html):
              soup = BeautifulSoup(html, "html.parser")
              for tag in soup(["script", "style", "nav", "header", "footer"]):
                  tag.decompose()
              text = soup.get_text(separator="\n", strip=True)
              lines = [l for l in text.splitlines() if l.strip()]
              return "\n".join(lines)


          def parse_case(text, url):
              case = {
                  "url": url, "scraped_at": datetime.now().isoformat(),
                  "case_number": "", "court": "", "date": "", "accused": "",
                  "charges": [], "verdict": "", "sentence": "", "province": "",
                  "full_text": text, "summary": "",
              }
              m = re.search(r"CASE\s*NO[:\.]?\s*([A-Z]{1,4}[\s\d]+/\d{4})", text, re.I)
              if m:
                  case["case_number"] = m.group(1).strip()
              for c in ["Gauteng Division, Pretoria", "Gauteng Local Division, Johannesburg",
                        "Western Cape High Court", "KwaZulu-Natal High Court",
                        "Eastern Cape High Court", "Supreme Court of Appeal"]:
                  if c.lower() in text.lower():
                      case["court"] = c
                      break
              for p in ["Gauteng", "Western Cape", "KwaZulu-Natal", "Eastern Cape",
                        "Limpopo", "Mpumalanga", "Northern Cape", "Free State", "North West"]:
                  if p.lower() in text.lower():
                      case["province"] = p
                      break
              m = re.search(r"\band\b\s*\n+([A-Z][A-Z\s]+?)\s+ACCUSED", text)
              if m:
                  case["accused"] = m.group(1).strip()
              m = re.search(r"DATE[:\s]+(\d{1,2}[\-/]\d{1,2}[\-/]\d{2,4})", text, re.I)
              if m:
                  case["date"] = m.group(1)
              for ch in ["murder", "rape", "kidnapping", "robbery", "attempted murder",
                         "assault", "human trafficking", "femicide", "fraud"]:
                  if ch in text.lower():
                      case["charges"].append(ch)
              if "found guilty" in text.lower():
                  case["verdict"] = "Guilty"
              elif re.search(r"acquitted|not guilty", text, re.I):
                  case["verdict"] = "Not Guilty"
              for pat in [r"life imprisonment", r"\d+\s*years['\s]?\s*imprisonment"]:
                  m = re.search(pat, text, re.I)
                  if m:
                      case["sentence"] = m.group(0).strip()
                      break
              case["summary"] = text[:1000].replace("\n", " ").strip()
              return case


          def case_slug(url):
              return re.sub(r"[^\w]", "_", url.rstrip("/").split("/")[-1].replace(".html", ""))


          def already_scraped(url):
              return (OUTPUT_DIR / f"{case_slug(url)}.json").exists()


          def save_case(case, url):
              slug = re.sub(r"[^\w]", "_", case.get("case_number") or case_slug(url))
              path = OUTPUT_DIR / f"{slug}.json"
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(case, f, ensure_ascii=False, indent=2)
              log.info(f"Saved -> {path}")


          def run():
              if not SERPAPI_KEY:
                  raise RuntimeError("SERPAPI_KEY not set.")
              all_urls = set()
              for query in QUERIES:
                  found = serpapi_search(query)
                  all_urls.update(found)
                  log.info(f"Total URLs so far: {len(all_urls)}")
                  sleep(uniform(1, 2))
              log.info(f"Unique cases to process: {len(all_urls)}")
              for url in sorted(all_urls):
                  if already_scraped(url):
                      log.info(f"Skip (cached): {url}")
                      continue
                  html = fetch_html(url)
                  if not html:
                      continue
                  text = parse_text_from_html(html)
                  if not text:
                      continue
                  case = parse_case(text, url)
                  save_case(case, url)
                  sleep(uniform(2, 4))
              log.info(f"Done. Cases in ./{OUTPUT_DIR}/")


          if __name__ == "__main__":
              run()
          EOF

      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scraper.py

      - name: Commit new cases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cases/
          git diff --cached --quiet || git commit -m "scraped cases $(date +'%Y-%m-%d')"
          git push