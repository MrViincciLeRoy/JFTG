name: SAFLII Crime Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tor
        run: |
          sudo apt-get install -y tor
          sudo service tor start
          sleep 5
          curl --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip || echo "Tor check failed but continuing"

      - name: Install dependencies
        run: pip install pdfplumber requests[socks] PySocks

      - name: Run scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scraper.py

      - name: Commit new cases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cases/
          git diff --cached --quiet || git commit -m "scraped cases $(date +'%Y-%m-%d')"
          git push